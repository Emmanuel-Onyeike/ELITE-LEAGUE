    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');

:root {
    --primary: #2563eb; /* Updated to your Tech Nxxt Blue */
    --primary-glow: rgba(37, 99, 235, 0.3);
    --bg-dark: #020617;
    --border-color: rgba(255, 255, 255, 0.08);
}

body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg-dark);
    color: #f1f5f9;
    overflow: hidden;
    height: 100vh;
}

.font-grotesk { font-family: 'Space Grotesk', sans-serif; }

/* SIDEBAR: Modern Glassmorphism */
.sidebar {
    width: 280px;
    background: rgba(2, 6, 23, 0.8);
    backdrop-filter: blur(20px);
    border-right: 1px solid var(--border-color);
}

.nav-link {
    position: relative;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.nav-link:hover {
    background: rgba(37, 99, 235, 0.05);
    padding-left: 2rem;
}

.nav-link.active {
    background: var(--primary);
    color: white;
    box-shadow: 0 4px 20px var(--primary-glow);
}

/* VIEW CARDS: Added subtle inner glow */
.view-card {
    background: linear-gradient(165deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0) 100%);
    border: 1px solid var(--border-color);
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.view-card:hover {
    transform: translateY(-4px);
    border-color: var(--primary);
    box-shadow: 0 10px 30px -10px var(--primary-glow);
}

/* STAT CARDS: Bento-Grid style */
.stat-card {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.05);
    backdrop-filter: blur(8px);
}

.stat-card:hover {
    background: rgba(255,255,255,0.04);
    border-color: rgba(37, 99, 235, 0.5);
}

/* ANIMATION: Smoother transition for dynamic content */
.view-active {
    animation: slideUpFade 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

@keyframes slideUpFade {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* SCROLLBAR: Stealthy styling */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { 
    background: rgba(255,255,255,0.1); 
    border-radius: 10px; 
}
::-webkit-scrollbar-thumb:hover { background: var(--primary); }
    </style>

        function switchView(viewName) {
            const container = document.getElementById('content');
            const contentHTML = views[viewName] || views['Overview'];
            
            container.innerHTML = `
                <div class="view-active">${contentHTML}</div>
            `;
            
            // Update active sidebar
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('onclick').includes(viewName)) {
                    link.classList.add('active');
                }
            });
        }

        function startClock() {
            const clockEl = document.getElementById('clock');
            setInterval(() => {
                const now = new Date();
                clockEl.textContent = now.toLocaleTimeString('en-GB', { 
                    hour: '2-digit', 
                    minute: '2-digit', 
                    second: '2-digit' 
                });
            }, 1000);
        }

        function toggleMobileMenu() {
            const menu = document.getElementById('mobileMenu');
            menu.classList.toggle('hidden');
        }

        // Initialize
        window.onload = function() {
            startClock();
            switchView('Overview');
            
            // Tailwind script already loaded via CDN
