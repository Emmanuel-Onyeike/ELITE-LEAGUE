<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite League | Season 2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        nxxtBlue: {
                            DEFAULT: '#2563eb', // Electric Blue
                            dark: '#1e3a8a',
                        },
                        nxxtDark: '#020617',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-nxxtDark text-white font-sans selection:bg-nxxtBlue">

    <!-- Landing Hero -->
    <main class="relative flex flex-col items-center justify-center min-h-screen px-6 text-center">
        
        <!-- Status Badge -->
        <div class="mb-8">
            <span class="px-4 py-1 text-[10px] font-bold tracking-widest text-nxxtBlue uppercase border border-nxxtBlue/30 rounded-full bg-nxxtBlue/10">
                Season 2 • Official Launch
            </span>
        </div>

        <!-- Heading -->
        <h1 class="text-6xl md:text-9xl font-black mb-6 uppercase tracking-tight">
            Elite <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-blue-600">League</span>
        </h1>
        
        <p class="max-w-xl mb-10 text-lg md:text-xl text-slate-400">
            The ultimate campus football experience. Track fixtures, manage squads, and claim the title.
        </p>

        <!-- CTA -->
        <div class="flex gap-4">
            <button onclick="document.getElementById('modal').classList.remove('hidden')" 
                    class="px-8 py-4 font-bold text-white transition bg-nxxtBlue rounded-lg hover:bg-blue-500 hover:scale-[1.02] active:scale-[0.98]">
                Register Team
            </button>
            <button class="px-8 py-4 font-bold transition bg-slate-800/50 border border-slate-700 rounded-lg hover:bg-slate-800">
                View Schedule
            </button>
        </div>

        <!-- Metrics -->
        <div class="grid grid-cols-3 gap-8 mt-20 border-t border-slate-800 pt-8 w-full max-w-2xl">
            <div>
                <div class="text-3xl font-bold">12</div>
                <div class="text-[10px] text-slate-500 uppercase tracking-widest mt-1">Teams</div>
            </div>
            <div>
                <div class="text-3xl font-bold">48</div>
                <div class="text-[10px] text-slate-500 uppercase tracking-widest mt-1">Fixtures</div>
            </div>
            <div>
                <div class="text-3xl font-bold">98%</div>
                <div class="text-[10px] text-slate-500 uppercase tracking-widest mt-1">Attendance</div>
            </div>
        </div>
    </main>

    <!-- Centered Modal Alert -->
    <div id="modal" class="hidden fixed inset-0 flex items-center justify-center p-4 bg-nxxtDark/90 backdrop-blur-md z-50">
        <div class="w-full max-w-sm p-8 bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl">
            <h3 class="text-xl font-bold mb-2">Registration Status</h3>
            <p class="mb-6 text-slate-400">Season 2 registration is currently locked. The portal will open for team submissions on the 20th.</p>
            <button onclick="document.getElementById('modal').classList.add('hidden')" 
                    class="w-full py-3 font-bold text-white transition bg-nxxtBlue rounded-lg hover:bg-blue-500">
                Acknowledge
            </button>
        </div>
    </div>

</body>
</html>
