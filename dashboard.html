    <style>
        :root {
            --neon-blue: #00f2ff;
            --glass: rgba(5, 5, 5, 0.85);
            --border: rgba(255, 255, 255, 0.05);
            --accent-green: #00ffaa;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #010101;
            color: #ececec;
            overflow: hidden;
            height: 100vh;
        }

        .cyber-grid {
            background-image: linear-gradient(rgba(0, 242, 255, 0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 242, 255, 0.02) 1px, transparent 1px);
            background-size: 35px 35px;
        }

        .viewport-glass {
            background: var(--glass);
            backdrop-blur: 60px;
            border: 1px solid var(--border);
            box-shadow: 0 0 100px rgba(0,0,0,0.9);
            border-radius: 40px;
        }

        .command-rail {
            width: 85px;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 0;
            gap: 1rem;
            background: rgba(0,0,0,0.8);
        }

        .rail-btn {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            color: #444;
            font-size: 1.1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
        }

        .rail-btn:hover {
            color: var(--neon-blue);
            background: rgba(0, 242, 255, 0.05);
        }

        .rail-btn.active {
            color: white;
            background: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
        }

        .neural-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 24px;
            transition: 0.3s ease;
        }
        .neural-card:hover {
            border-color: var(--neon-blue);
            background: rgba(255,255,255,0.04);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        #mainStage {
            transition: opacity 0.4s ease, transform 0.4s ease;
            opacity: 0;
            transform: scale(0.99);
        }
        #mainStage.visible {
            opacity: 1;
            transform: scale(1);
        }
        
        .glitch-text {
            text-transform: uppercase;
            letter-spacing: -0.05em;
        }

        .status-pill {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 4px 12px;
            border-radius: 100px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
        }
    </style>
</head>

        function sysAction(view) {
            const stage = document.getElementById('mainStage');
            
            document.querySelectorAll('.rail-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.getAttribute('data-id') === view) btn.classList.add('active');
            });

            stage.classList.remove('visible');
            setTimeout(() => {
                stage.innerHTML = CORE_DATA[view] || CORE_DATA['Overview'];
                stage.classList.add('visible');
            }, 300);
        }

        setInterval(() => {
            const now = new Date();
            document.getElementById('sysClock').innerText = now.toTimeString().split(' ')[0];
        }, 1000);

        document.addEventListener('DOMContentLoaded', () => sysAction('Overview'));
    </script>
