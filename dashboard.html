<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELITE // NEURAL 2026</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-blue: #00f2ff;
            --glass: rgba(5, 5, 5, 0.8);
            --border: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #020202;
            color: #ececec;
            overflow: hidden;
            height: 100vh;
        }

        /* --- FUTURISTIC GRID BG --- */
        .cyber-grid {
            background-image: linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            perspective: 1000px;
        }

        /* --- NEURAL VIEWPORT --- */
        .viewport-glass {
            background: var(--glass);
            backdrop-blur: 80px;
            border: 1px solid var(--border);
            box-shadow: 0 0 80px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,255,255,0.02);
            border-radius: 40px;
        }

        /* --- SIDE COMMAND RAIL --- */
        .command-rail {
            width: 80px;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 0;
            gap: 1.5rem;
            background: rgba(0,0,0,0.4);
        }

        .rail-btn {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            color: #4a4a4a;
            font-size: 1.2rem;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
            position: relative;
        }

        .rail-btn:hover {
            color: var(--neon-blue);
            background: rgba(0, 242, 255, 0.05);
        }

        .rail-btn.active {
            color: white;
            background: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
        }

        /* --- GLITCH ANIMATION --- */
        .glitch-text {
            text-transform: uppercase;
            letter-spacing: -0.05em;
            position: relative;
        }

        /* --- CUSTOM SCROLL --- */
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* --- ANIMATED CONTENT INJECTION --- */
        #mainStage {
            transition: opacity 0.4s ease, transform 0.4s ease;
            opacity: 0;
            transform: scale(0.98) translateY(10px);
        }
        #mainStage.visible {
            opacity: 1;
            transform: scale(1) translateY(0);
        }
    </style>
</head>
<body class="cyber-grid">

    <div class="fixed top-[-10%] right-[-10%] w-[40%] h-[40%] bg-blue-500/10 blur-[150px] rounded-full"></div>
    <div class="fixed bottom-[-5%] left-[-5%] w-[30%] h-[30%] bg-cyan-500/10 blur-[150px] rounded-full"></div>

    <div class="flex h-screen w-full p-4 md:p-8">
        
        <aside class="command-rail rounded-l-[40px] z-50">
            <div class="mb-10 text-white font-black italic text-xl">E.</div>
            
            <div onclick="sysAction('Overview')" class="rail-btn active" data-id="Overview" title="Terminal"><i class="fas fa-terminal"></i></div>
            <div onclick="sysAction('Hall of Fame')" class="rail-btn" data-id="Hall of Fame" title="Legends"><i class="fas fa-crown"></i></div>
            <div onclick="sysAction('Records')" class="rail-btn" data-id="Records" title="Analytics"><i class="fas fa-chart-bar"></i></div>
            <div onclick="sysAction('Stake')" class="rail-btn" data-id="Stake" title="Stake Market"><i class="fas fa-coins"></i></div>
            <div onclick="sysAction('Database')" class="rail-btn" data-id="Database" title="Nodes"><i class="fas fa-network-wired"></i></div>
            
            <div class="mt-auto">
                <div onclick="sysAction('Payment')" class="rail-btn text-emerald-500" data-id="Payment" title="Finances"><i class="fas fa-wallet"></i></div>
            </div>
        </aside>

        <main class="flex-1 viewport-glass flex flex-col relative overflow-hidden">
            
            <nav class="h-20 flex items-center justify-between px-10 border-b border-white/5">
                <div class="flex items-center gap-4">
                    <span class="text-[10px] font-bold tracking-[0.5em] text-cyan-400 font-mono uppercase">Node: PH_084_MARCH_2026</span>
                </div>
                <div class="flex items-center gap-8 font-mono text-[10px] font-bold">
                    <div class="flex items-center gap-2">
                        <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse shadow-[0_0_10px_#22c55e]"></span>
                        <span class="text-white/40">UPLINK_LIVE</span>
                    </div>
                    <div id="sysClock" class="text-white tracking-widest">00:00:00</div>
                </div>
            </nav>

            <div id="mainStage" class="flex-1 p-12 overflow-y-auto no-scrollbar">
                </div>

            <footer class="h-12 flex items-center px-10 border-t border-white/5 bg-black/20">
                <div class="text-[9px] font-mono text-white/20 uppercase tracking-[0.2em]">
                    Elite League Professional Management Interface // Build 2026.03.29
                </div>
            </footer>
        </main>

    </div>

    <script>
        const CORE_DATA = {
            'Overview': `
                <div class="h-full flex flex-col justify-center">
                    <p class="text-cyan-400 font-bold tracking-[0.6em] text-[10px] mb-6 uppercase font-mono">Initiating Neural Link...</p>
                    <h1 class="text-8xl font-black text-white italic glitch-text mb-4 leading-none">SYSTEM<br>ONLINE.</h1>
                    <p class="text-white/40 text-xl font-light max-w-xl leading-relaxed">Welcome back, Controller. All league modules for the Faculty of Computing are ready for dispatch.</p>
                    <div class="mt-12 flex gap-6">
                        <button class="bg-white text-black px-12 py-5 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-cyan-400 transition-all duration-500">Initialize Match</button>
                        <button class="border border-white/10 text-white px-12 py-5 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-white/5 transition-all">Node Map</button>
                    </div>
                </div>`,

            'Hall of Fame': `
                <div>
                    <h2 class="text-4xl font-black text-white italic tracking-tighter mb-12 uppercase">Legendary_Assets</h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                        ${[
                            {name: 'CSC_TITANS', desc: 'Season 25 Champion', icon: 'fa-crown', color: 'text-amber-500'},
                            {name: 'NXXT_V1', desc: 'Highest Goal Payload', icon: 'fa-bolt', color: 'text-cyan-500'},
                            {name: 'VOLT_PH', desc: 'Elite Defensive Node', icon: 'fa-shield-halved', color: 'text-indigo-500'}
                        ].map(item => `
                            <div class="p-10 rounded-[30px] border border-white/5 bg-white/[0.02] group hover:border-cyan-500/50 transition-all duration-500">
                                <i class="fas ${item.icon} ${item.color} text-3xl mb-6"></i>
                                <h4 class="text-xl font-black text-white tracking-tighter italic">${item.name}</h4>
                                <p class="text-white/30 text-xs mt-2 uppercase tracking-widest font-mono">${item.desc}</p>
                            </div>
                        `).join('')}
                    </div>
                </div>`,

            'Stake': `
                <div>
                    <h2 class="text-4xl font-black text-white italic tracking-tighter mb-8 uppercase">Stake_Market_v2</h2>
                    <div class="bg-cyan-500/5 border border-cyan-500/20 p-8 rounded-[30px] mb-8">
                        <div class="flex justify-between items-center mb-6">
                            <span class="text-[10px] font-mono font-bold text-cyan-400 uppercase">Current Market Multiplier</span>
                            <span class="text-3xl font-black text-white">x2.45</span>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <button class="bg-cyan-500 text-black py-4 rounded-xl font-bold text-[10px] uppercase tracking-widest">Open High-Risk Node</button>
                            <button class="bg-white/5 text-white py-4 rounded-xl font-bold text-[10px] uppercase tracking-widest">Market Analytics</button>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 gap-4 font-mono text-[11px]">
                        <div class="p-4 border border-white/5 rounded-xl flex justify-between text-white/60">
                            <span>MATCH_ID_402</span><span>STAKE: 45,000 NGN</span><span class="text-green-500">SUCCESS</span>
                        </div>
                    </div>
                </div>`,

            'Database': `
                <div class="h-full flex flex-col">
                    <h2 class="text-4xl font-black text-white italic tracking-tighter mb-8 uppercase">Node_Database</h2>
                    <div class="flex-1 bg-white/[0.01] border border-white/5 rounded-[30px] overflow-hidden">
                        <table class="w-full font-mono text-[11px] text-left">
                            <thead class="bg-white/5 text-cyan-400">
                                <tr>
                                    <th class="p-6 uppercase tracking-widest">Node_ID</th>
                                    <th class="p-6 uppercase tracking-widest">Protocol</th>
                                    <th class="p-6 uppercase tracking-widest">Ping</th>
                                    <th class="p-6 uppercase tracking-widest">Status</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-white/5">
                                <tr><td class="p-6">PORT_H_ALPHA</td><td class="p-6 italic">SECURE_L2</td><td class="p-6">12ms</td><td class="p-6 text-green-500">ACTIVE</td></tr>
                                <tr><td class="p-6">ENUGU_BRAVO</td><td class="p-6 italic">SECURE_L2</td><td class="p-6">45ms</td><td class="p-6 text-yellow-500">SYNCING</td></tr>
                                <tr><td class="p-6">LAGOS_MAIN</td><td class="p-6 italic">SECURE_L3</td><td class="p-6">08ms</td><td class="p-6 text-green-500">ACTIVE</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>`
        };

        function sysAction(view) {
            const stage = document.getElementById('mainStage');
            
            // Sidebar Active State
            document.querySelectorAll('.rail-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.getAttribute('data-id') === view) btn.classList.add('active');
            });

            // Transition
            stage.classList.remove('visible');
            
            setTimeout(() => {
                stage.innerHTML = CORE_DATA[view] || CORE_DATA['Overview'];
                stage.classList.add('visible');
            }, 300);
        }

        // System Clock
        setInterval(() => {
            const now = new Date();
            document.getElementById('sysClock').innerText = now.toTimeString().split(' ')[0];
        }, 1000);

        // Initial Boot
        document.addEventListener('DOMContentLoaded', () => {
            sysAction('Overview');
        });
    </script>
</body>
</html>
