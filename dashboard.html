<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELITE // QUANTUM 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body class="bg-[#050505] text-slate-300 overflow-hidden">

    <div class="fixed inset-0 pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-blue-600/10 blur-[150px] rounded-full"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-indigo-600/10 blur-[150px] rounded-full"></div>
    </div>

    <header class="fixed top-0 inset-x-0 h-20 flex items-center justify-between px-12 z-50 backdrop-blur-md border-b border-white/5">
        <div class="flex items-center gap-6">
            <div class="text-white font-black tracking-tighter text-xl italic underline decoration-blue-500 decoration-4 underline-offset-8">ELITE26</div>
            <div class="px-3 py-1 bg-white/5 border border-white/10 rounded-full text-[9px] font-mono tracking-widest text-blue-400">SESSION_MAR_2026</div>
        </div>
        <div class="flex items-center gap-4 text-[10px] font-bold text-slate-500 font-mono">
            <span class="flex items-center gap-2"><span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span> UPLINK_STABLE</span>
            <div class="h-4 w-[1px] bg-white/10 mx-2"></div>
            <span id="digitalClock">00:00:00</span>
        </div>
    </header>

    <main class="relative h-screen flex flex-col items-center justify-center p-8">
        <div id="mainDisplay" class="w-full max-w-6xl h-[70vh] glass-panel rounded-[4rem] p-12 overflow-hidden flex flex-col relative">
            <div class="absolute top-10 right-12 opacity-10 select-none pointer-events-none">
                <i class="fas fa-microchip text-[12rem] text-white"></i>
            </div>

            <div id="contentInjection" class="view-active h-full flex flex-col">
                </div>
        </div>
    </main>

    <div class="dock-container">
        <div class="dock">
            <div onclick="updateView('Overview')" class="dock-item active" data-title="Overview"><i class="fas fa-layer-group"></i></div>
            <div class="w-[1px] h-6 bg-white/10 mx-1"></div>
            <div onclick="updateView('Hall of Fame')" class="dock-item" data-title="Hall of Fame"><i class="fas fa-crown"></i></div>
            <div onclick="updateView('Records')" class="dock-item" data-title="Records"><i class="fas fa-chart-line"></i></div>
            <div onclick="updateView('Database')" class="dock-item" data-title="Database"><i class="fas fa-server"></i></div>
            <div class="w-[1px] h-6 bg-white/10 mx-1"></div>
            <div onclick="updateView('Stake')" class="dock-item text-amber-500" data-title="Stake"><i class="fas fa-coins"></i></div>
            <div onclick="updateView('Payment')" class="dock-item text-emerald-500" data-title="Payment"><i class="fas fa-credit-card"></i></div>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
